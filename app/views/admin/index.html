<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Posts</title>
    <link rel="stylesheet" href="../../../public/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <div class="lista-posts-base">
        <div>
            <h1>Lista de Posts</h1>
        </div>
        <div class="navbar">
            <input type="text" placeholder="Pesquisar...">
             <button class="botao-atual">Criar Publicação</button>
        </div>
        <table class="tabelaposts">
            <thead>
                <tr>
                    <th class="th-left">Post ID</th>
                    <th>Data</th>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Interações</th>
                    <th class="th-right">Ações</th>
                </tr>
            </thead>
            <tbody id="tabelapostsbody">
            </tbody>
        </table>
        
        <div>
            <button class="sem-mais-paginas">Anterior</button>
            <button class="botao-atual">1</button>
            <button>2</button>
            <button>Próximo</button>
        </div>

    </div>
    <script src="/public/js/index.js"></script>
</body>
</html>
