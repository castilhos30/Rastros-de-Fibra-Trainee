<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Visualizar</title>
    <link rel="stylesheet" href="/public/css/modal-visualizar.css">
</head>
<body>
    <div class="painelvisualizar">
        <h1>Informações do Usuário</h1>
        <form>
            <div class="visualizarusuario">
                <div class="campovisualizar">
                    <label for="usuario-id">ID:</label>
                    <input type="text" id="usuario-id" value="1" readonly>
                </div>
                <div class="campovisualizar">
                    <label for="usuario-nome">Nome:</label>
                    <input type="text" id="usuario-nome" value="Usuario" readonly>
                </div>

                <div class="campovisualizar">
                    <label for="usuario-email">Email:</label>
                    <input type="email" id="usuario-email" value="usuario@email.com" readonly>
                </div>

                <div class="campovisualizar">
                    <label for="usuario-senha">Senha:</label>
                    <input type="password" id="usuario-senha" value="12345678" readonly>
                </div>
            </div>
            <div class="botaofecharvisualizar">
                <button class="fecharmodalvisualizar">Fechar</button>
            </div>
        </form>
    </div>
</body>
</html>
